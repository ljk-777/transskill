<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TransSkill Marketplace</title>
<style>
  :root { color-scheme: light dark; --bg: #f8fafc; --fg: #172033; --muted: #5b6475; --line: #64748b; --neutral: #e2e8f0; --input: #bfdbfe; --process: #c7d2fe; --storage: #99f6e4; --external: #fde68a; --risk: #fecaca; }
  @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --fg: #e5e7eb; --muted: #a3adbd; --line: #94a3b8; --neutral: #334155; --input: #1d4ed8; --process: #4338ca; --storage: #0f766e; --external: #92400e; --risk: #991b1b; } }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  main { max-width: 980px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 14px; font-weight: 600; fill: var(--fg); }
  .sml { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; rx: 8; ry: 8; }
  .neutral { fill: var(--neutral); } .input { fill: var(--input); } .process { fill: var(--process); } .storage { fill: var(--storage); } .external { fill: var(--external); } .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.7; }
</style>
<main>
<svg viewBox="0 0 900 620">
  <text x="20" y="30" class="title">TransSkill Marketplace — Architecture</text>
  <text x="20" y="48" class="sml">Skill registry, converter engine, and management CLI — all in one</text>

  <!-- === Zone: Registry (top) === -->
  <rect x="20" y="70" width="860" height="170" class="zone" />
  <text x="32" y="92" class="label" fill="var(--fg)">📦 Skill Registry (npm + GitHub)</text>

  <!-- Official skills -->
  <rect x="50" y="110" width="200" height="50" class="node storage" />
  <text x="95" y="136" class="label" fill="var(--fg)">📋 Official Skills</text>
  <text x="60" y="150" class="sml">openclaw / cursor / claude-code</text>

  <!-- Community skills -->
  <rect x="300" y="110" width="200" height="50" class="node external" />
  <text x="348" y="136" class="label" fill="var(--fg)">🌐 Community Skills</text>
  <text x="310" y="150" class="sml">user-submitted, reviewed</text>

  <!-- User local skills -->
  <rect x="550" y="110" width="200" height="50" class="node process" />
  <text x="595" y="136" class="label" fill="var(--fg)">🔧 Your Skills</text>
  <text x="560" y="150" class="sml">private / team-only</text>

  <!-- Search -->
  <rect x="50" y="180" width="330" height="40" class="node neutral" />
  <text x="100" y="205" class="sml">🔍 search  ·  browse by platform  ·  trending</text>
  <rect x="430" y="180" width="200" height="40" class="node neutral" />
  <text x="460" y="205" class="sml">📊 stats  ·  dependents  ·  versions</text>

  <!-- Arrow: Registry → CLI -->
  <path d="M 450 240 L 450 275" class="edge" marker-end="url(#a)" />

  <!-- === Zone: CLI Engine (middle) === -->
  <rect x="20" y="280" width="860" height="170" class="zone" />
  <text x="32" y="302" class="label" fill="var(--fg)">⚙️  TransSkill Engine (CLI)</text>

  <!-- Install -->
  <rect x="50" y="320" width="180" height="55" class="node process" />
  <text x="100" y="343" class="label" fill="var(--fg)">transskill install</text>
  <text x="60" y="360" class="sml">download + resolve dependencies</text>

  <!-- Convert -->
  <rect x="280" y="320" width="180" height="55" class="node process" />
  <text x="330" y="343" class="label" fill="var(--fg)">transskill convert</text>
  <text x="290" y="360" class="sml">auto-detect / parse / map / render</text>

  <!-- Manage -->
  <rect x="510" y="320" width="180" height="55" class="node process" />
  <text x="555" y="343" class="label" fill="var(--fg)">transskill manage</text>
  <text x="520" y="360" class="sml">list / update / remove / link</text>

  <!-- Publish -->
  <rect x="740" y="320" width="120" height="55" class="node risk" />
  <text x="770" y="343" class="label" fill="var(--fg)">transskill publish</text>
  <text x="748" y="360" class="sml">submit to registry</text>

  <!-- Arrow: CLI → Files -->
  <path d="M 450 450 L 450 480" class="edge" marker-end="url(#a)" />

  <!-- === Zone: Output (bottom) === -->
  <rect x="20" y="485" width="860" height="110" class="zone" />
  <text x="32" y="507" class="label" fill="var(--fg)">💻  Your Project</text>

  <!-- SKILL.md style -->
  <rect x="60" y="525" width="170" height="50" class="node neutral" />
  <text x="100" y="545" class="sml">SKILL.md style</text>
  <text x="80" y="562" class="sml">OpenClaw / Claude Code</text>

  <!-- .cursorrules style -->
  <rect x="280" y="525" width="170" height="50" class="node neutral" />
  <text x="320" y="545" class="sml">.cursorrules style</text>
  <text x="300" y="562" class="sml">Cursor IDE / Windsurf</text>

  <!-- .mdc style -->
  <rect x="500" y="525" width="170" height="50" class="node neutral" />
  <text x="540" y="545" class="sml">.mdc style (multi-file)</text>
  <text x="520" y="562" class="sml">Cursor 2.3+</text>

  <!-- MCP style -->
  <rect x="720" y="525" width="140" height="50" class="node neutral" />
  <text x="748" y="545" class="sml">MCP JSON</text>
  <text x="738" y="562" class="sml">MCP servers</text>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--line)" />
    </marker>
  </defs>
</svg>

<p style="margin-top: 16px; color: var(--muted); font-size: 13px;">
  ⚡ <strong>用户视角</strong>：<code>transskill search weather</code> → <code>transskill install weather</code> → <code>transskill convert weather.skill.md --to .cursorrules</code>
</p>
</main>
